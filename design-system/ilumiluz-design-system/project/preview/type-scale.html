<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:28px 32px;background:var(--il-off);box-sizing:border-box;font-family:'Barlow',sans-serif}
.l{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--il-gold);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.l::before{content:'';width:24px;height:0.5px;background:var(--il-gold)}
.row{display:grid;grid-template-columns:130px 1fr 90px;gap:20px;align-items:baseline;padding:10px 0;border-bottom:0.5px solid var(--il-line-dark)}
.m{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--il-muted)}
.m b{display:block;color:var(--il-deep);font-size:11px;margin-bottom:3px;font-weight:500}
.s{font-family:ui-monospace,monospace;font-size:10px;color:var(--il-gold);text-align:right}
</style></head><body>
<p class="l">Type Scale</p>
<div class="row"><div class="m"><b>Display L</b>Page</div><p style="font-family:'Barlow Condensed',sans-serif;font-weight:400;font-size:44px;line-height:0.9;letter-spacing:-0.02em;text-transform:uppercase;color:var(--il-deep);margin:0">Tipografia</p><p class="s">72px / 400</p></div>
<div class="row"><div class="m"><b>H1</b>Section</div><p style="font-family:'Barlow Condensed',sans-serif;font-weight:500;font-size:28px;letter-spacing:0.01em;text-transform:uppercase;color:var(--il-deep);margin:0">Joias Sob Medida</p><p class="s">40px / 500</p></div>
<div class="row"><div class="m"><b>Serif Accent</b>Highlight</div><p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:28px;color:var(--il-gold);margin:0">Do desenho ao metal</p><p class="s">40px / 300i</p></div>
<div class="row"><div class="m"><b>Body L</b>Paragraph</div><p style="font-family:'Barlow',sans-serif;font-weight:300;font-size:13px;line-height:1.8;color:var(--il-text);margin:0">Uma joia pode ser um ponto de presença.</p><p class="s">14px / 300</p></div>
<div class="row"><div class="m"><b>Label</b>Eyebrow</div><p style="font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--il-gold);margin:0">Sobre a Ilumiluz</p><p class="s">9px / +0.3em</p></div>
</body></html>
