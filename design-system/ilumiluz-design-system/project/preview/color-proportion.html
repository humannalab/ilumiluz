<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--il-off);font-family:var(--il-font-body);color:var(--il-text);box-sizing:border-box}
.title{font-family:var(--il-font-display);font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--il-gold);margin:0 0 18px;display:flex;align-items:center;gap:10px}
.title::before{content:'';width:24px;height:0.5px;background:var(--il-gold)}
.bar{display:flex;height:56px;gap:1px;overflow:hidden}
.a{flex:90;background:#F2F2F2;border:0.5px solid var(--il-line);display:flex;align-items:center;justify-content:center;font-family:var(--il-font-display);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--il-muted)}
.b{flex:6;background:var(--il-gold);display:flex;align-items:center;justify-content:center;color:#F5ECF0;font-family:var(--il-font-display);font-size:9px}
.c{flex:4;background:var(--il-ether-deep);color:#E4EFF5;display:flex;align-items:center;justify-content:center;font-family:var(--il-font-display);font-size:9px}
.note{font-size:11px;color:var(--il-muted);margin-top:10px}
</style></head><body>
<p class="title">Proportion 90 / 6 / 4</p>
<div class="bar"><div class="a">90% Off White</div><div class="b">6%</div><div class="c">4%</div></div>
<p class="note">Off-white dominates. Gold warms. Ether-deep closes and anchors.</p>
</body></html>
