<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--il-off);font-family:var(--il-font-body);font-weight:300;color:var(--il-text);box-sizing:border-box}
.row{display:flex;gap:1px;background:var(--il-line)}
.sw{flex:1;height:110px;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;border:0.5px solid rgba(0,0,0,0.06)}
.n{font-family:ui-monospace,monospace;font-size:9px;line-height:1.4}
.title{font-family:var(--il-font-display);font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:#561730;margin:0 0 14px;display:flex;align-items:center;gap:10px}
.title::before{content:'';width:24px;height:0.5px;background:#561730}
</style></head><body>
<p class="title">Vinho — cor do logo</p>
<div class="row">
<div class="sw" style="background:#F5ECF0"><span class="n" style="color:#561730">--il-wine-pale<br>#F5ECF0</span></div>
<div class="sw" style="background:#C9839A"><span class="n" style="color:#4A1228">--il-wine-light<br>#C9839A</span></div>
<div class="sw" style="background:#8C3050"><span class="n" style="color:#F5ECF0">--il-wine-mid<br>#8C3050</span></div>
<div class="sw" style="background:#561730"><span class="n" style="color:#F5ECF0">--il-wine<br>#561730 ★ logo</span></div>
<div class="sw" style="background:#2E0A18"><span class="n" style="color:#C9839A">--il-wine-deep<br>#2E0A18</span></div>
</div>
</body></html>
