<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--il-off);box-sizing:border-box}
.l{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--il-gold);margin:0 0 14px;display:flex;align-items:center;gap:10px}
.l::before{content:'';width:24px;height:.5px;background:var(--il-gold)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.tile{aspect-ratio:3/4;background-size:cover;background-position:center;border:.5px solid var(--il-line)}
</style></head><body>
<p class="l">Imagery — jewelry photography</p>
<div class="grid">
<div class="tile" style="background-image:url(../assets/hero-anel-lirio.png)"></div>

<div class="tile" style="background-image:url(../assets/galeria-anel-botanico.png)"></div>
<div class="tile" style="background-image:url(../assets/galeria-brincos-triangulo.png)"></div>
<div class="tile" style="background-image:url(../assets/conversa-maos-artesao.png)"></div>
<div class="tile" style="background-image:url(../assets/sobre-colar-pedras.png)"></div>
<div class="tile" style="background-image:url(../assets/colecao-essencial-refeito.png)"></div>
<div class="tile" style="background-image:url(../assets/produto-colar-portal.png)"></div>
</div>
</body></html>
