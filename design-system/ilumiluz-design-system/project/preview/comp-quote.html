<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:28px 32px;background:var(--il-off);box-sizing:border-box}
.l{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--il-gold);margin:0 0 18px;display:flex;align-items:center;gap:10px}
.l::before{content:'';width:24px;height:.5px;background:var(--il-gold)}
.row{display:flex;flex-direction:column;gap:24px;max-width:560px}
.q{border-left:1px solid var(--il-gold);padding:4px 0 4px 22px}
.q p{font-family:'Barlow Condensed',sans-serif;font-style:normal;font-size:20px;font-weight:400;line-height:1.5;color:var(--il-deep);margin:0;letter-spacing:.01em;text-transform:uppercase}
.b{border-left-color:var(--il-ether)}.b p{color:var(--il-ether-deep)}
.cite{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--il-muted);margin-top:10px;display:block}
</style></head><body>
<p class="l">Quote — blockquote</p>
<div class="row">
<div class="q"><p>"O metal não é apenas matéria. Ele é memória, forma e possibilidade."</p><span class="cite">Ateliê Ilumiluz</span></div>
<div class="q b"><p>"Aqui, o luxo está na atenção, no tempo e no sentido."</p></div>
</div>
</body></html>
