<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:28px 32px;background:var(--il-off);box-sizing:border-box;font-family:'Barlow',sans-serif}
.l{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--il-gold);margin:0 0 18px;display:flex;align-items:center;gap:10px}
.l::before{content:'';width:24px;height:.5px;background:var(--il-gold)}
.row{display:grid;grid-template-columns:60px 1fr 90px;align-items:center;gap:18px;padding:6px 0;border-bottom:.5px solid var(--il-line-dark)}
.n{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--il-deep);font-weight:500}
.bar{height:8px;background:var(--il-gold);opacity:.7}
.u{font-size:11px;color:var(--il-muted);text-align:right;font-family:ui-monospace,monospace}
</style></head><body>
<p class="l">Spacing scale · 8px base</p>
<div class="row"><span class="n">8</span><div class="bar" style="width:8px"></div><span class="u">space-1</span></div>
<div class="row"><span class="n">16</span><div class="bar" style="width:16px"></div><span class="u">space-2</span></div>
<div class="row"><span class="n">24</span><div class="bar" style="width:24px"></div><span class="u">space-3 · gutter</span></div>
<div class="row"><span class="n">32</span><div class="bar" style="width:32px"></div><span class="u">space-4</span></div>
<div class="row"><span class="n">48</span><div class="bar" style="width:48px"></div><span class="u">space-6 · margin</span></div>
<div class="row"><span class="n">72</span><div class="bar" style="width:72px"></div><span class="u">space-9 · section</span></div>
<div class="row"><span class="n">96</span><div class="bar" style="width:96px"></div><span class="u">space-12</span></div>
</body></html>
