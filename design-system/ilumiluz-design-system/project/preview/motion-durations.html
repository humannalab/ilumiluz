<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:28px 32px;background:var(--il-off);box-sizing:border-box;font-family:'Barlow',sans-serif}
.l{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--il-gold);margin:0 0 18px;display:flex;align-items:center;gap:10px}
.l::before{content:'';width:24px;height:.5px;background:var(--il-gold)}
.row{display:grid;grid-template-columns:110px 80px 1fr 140px;gap:18px;align-items:center;padding:8px 0;border-bottom:.5px solid var(--il-line-dark)}
.n{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--il-deep);font-weight:500}
.v{font-family:ui-monospace,monospace;font-size:10px;color:var(--il-gold)}
.bw{height:4px;background:rgba(86,23,48,.12);border-radius:2px;overflow:hidden}
.b{height:100%;background:var(--il-gold);border-radius:2px}
.u{font-size:10.5px;color:var(--il-muted)}
</style></head><body>
<p class="l">Motion — duration scale</p>
<div class="row"><span class="n">Instant</span><span class="v">100ms</span><div class="bw"><div class="b" style="width:8%"></div></div><span class="u">:active, scale(.98)</span></div>
<div class="row"><span class="n">Fast</span><span class="v">200ms</span><div class="bw"><div class="b" style="width:16%"></div></div><span class="u">color / opacity</span></div>
<div class="row"><span class="n">Base</span><span class="v">300ms</span><div class="bw"><div class="b" style="width:24%"></div></div><span class="u">hover default</span></div>
<div class="row"><span class="n">Deliberate</span><span class="v">400ms</span><div class="bw"><div class="b" style="width:32%"></div></div><span class="u">line CTA, image zoom</span></div>
<div class="row"><span class="n">Slow</span><span class="v">500ms</span><div class="bw"><div class="b" style="width:40%"></div></div><span class="u">scroll reveal</span></div>
</body></html>
