<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:28px 32px;background:var(--il-off);box-sizing:border-box}
.l{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--il-gold);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.l::before{content:'';width:24px;height:0.5px;background:var(--il-gold)}
.hd{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:68px;line-height:0.92;letter-spacing:-0.02em;text-transform:uppercase;color:var(--il-deep)}
.hd em{font-style:italic;font-family:'Cormorant Garamond',serif;font-weight:300;font-size:72px;color:var(--il-gold);text-transform:none;letter-spacing:0}
.sub{font-family:'Barlow',sans-serif;font-size:13px;color:var(--il-muted);margin-top:14px;max-width:460px;line-height:1.75}
</style></head><body>
<p class="l">Display — headline pairing</p>
<p class="hd">Joias para<br>quem vive com <em>intenção.</em></p>
<p class="sub">Barlow Condensed 600 / 88px · UPPERCASE · letter-spacing −0.02em. Cormorant Garamond italic 300 as accent word.</p>
</body></html>
