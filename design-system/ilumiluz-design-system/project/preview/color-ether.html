<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--il-off);font-family:var(--il-font-body);font-weight:300;color:var(--il-text);box-sizing:border-box}
.row{display:flex;gap:1px;background:var(--il-line)}
.sw{flex:1;height:110px;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;border:0.5px solid rgba(0,0,0,0.06)}
.n{font-family:ui-monospace,monospace;font-size:9px;line-height:1.4}
.title{font-family:var(--il-font-display);font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--il-ether);margin:0 0 14px;display:flex;align-items:center;gap:10px}
.title::before{content:'';width:24px;height:0.5px;background:var(--il-ether)}
</style></head><body>
<p class="title">Ether Blue</p>
<div class="row">
<div class="sw" style="background:#E4EFF5"><span class="n" style="color:#2A4A5E">--il-ether-pale<br>#E4EFF5</span></div>
<div class="sw" style="background:#B8CDD9"><span class="n" style="color:#2A4A5E">--il-ether-light<br>#B8CDD9</span></div>
<div class="sw" style="background:#7B9FB8"><span class="n" style="color:#1A2E3A">--il-ether<br>#7B9FB8</span></div>
<div class="sw" style="background:#5F8BA8"><span class="n" style="color:#E4EFF5">--il-ether-mid<br>#5F8BA8</span></div>
<div class="sw" style="background:#2A4A5E"><span class="n" style="color:#B8CDD9">--il-ether-deep<br>#2A4A5E</span></div>
</div>
</body></html>
