<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:0;background:var(--il-off);font-family:'Barlow',sans-serif}
.box{background:var(--il-ether-deep);padding:44px 36px;color:var(--il-off)}
.eb{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--il-gold-light);margin:0 0 16px;display:flex;align-items:center;gap:10px}
.eb::before{content:'';width:28px;height:.5px;background:var(--il-gold-light)}
.h{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:38px;line-height:0.95;letter-spacing:-0.02em;text-transform:uppercase;color:var(--il-off);margin:0}
.h em{font-style:italic;font-family:'Cormorant Garamond',serif;font-weight:300;font-size:42px;color:var(--il-gold-light);text-transform:none;letter-spacing:0}
.p{font-size:13px;color:var(--il-ether-light);line-height:1.8;max-width:420px;margin:18px 0 0}
</style></head><body>
<div class="box">
<p class="eb">Contato</p>
<p class="h">Tudo começa com<br>uma <em>conversa.</em></p>
<p class="p">Peças esquecidas, herdadas ou que já não representam quem você é podem ganhar nova forma — e um novo significado.</p>
</div>
</body></html>
