<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--il-off);font-family:var(--il-font-body);font-weight:300;color:var(--il-text);box-sizing:border-box}
.row{display:flex;gap:1px;background:var(--il-line-dark)}
.sw{flex:1;height:110px;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;border:0.5px solid rgba(0,0,0,0.06)}
.n{font-family:ui-monospace,monospace;font-size:9px;line-height:1.4}
.title{font-family:var(--il-font-display);font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--il-deep);margin:0 0 14px;display:flex;align-items:center;gap:10px}
.title::before{content:'';width:24px;height:0.5px;background:var(--il-deep)}
</style></head><body>
<p class="title">Neutrals &amp; Text</p>
<div class="row">
<div class="sw" style="background:#FAF8F5"><span class="n" style="color:#8A857E">--il-white<br>#FAF8F5</span></div>
<div class="sw" style="background:#F2F2F2"><span class="n" style="color:#8A857E">--il-off · 90%<br>#F2F2F2</span></div>
<div class="sw" style="background:#EDE6D8"><span class="n" style="color:#6A6058">--il-warm-mid<br>#EDE6D8</span></div>
<div class="sw" style="background:#8A857E"><span class="n" style="color:#F7F3EC">--il-muted<br>#8A857E</span></div>
<div class="sw" style="background:#3D3830"><span class="n" style="color:#EDE6D8">--il-text<br>#3D3830</span></div>
<div class="sw" style="background:#1E1A14"><span class="n" style="color:#C9839A">--il-deep<br>#1E1A14</span></div>
</div>
</body></html>
